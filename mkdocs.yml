# MkDocs configuration for StateRustimation / Rusty Givens
# https://www.mkdocs.org/user-guide/configuration/

site_name: Rusty Givens
site_description: A modular AC Weighted Least-Squares State Estimator for power systems in Rust
site_url: https://rusty-givens.readthedocs.io/  # Update after RTD project creation
repo_url: https://github.com/haraldjendrian/rusty-givens
repo_name: rusty-givens
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  logo: assets/logo.png
  favicon: assets/logo.png

plugins:
  - search:
      lang: en

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - tables
  - admonition
  - attr_list

extra_css:
  - stylesheets/custom.css

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - Architecture: architecture.md
  - REST API: api.md
  - Case Study: case-study.md
